<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <!-- 渐变背景 -->
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- 背景矩形 -->
    <rect width="800" height="400" fill="url(#grad)"/>
    
    <!-- 装饰性圆点 -->
    <circle cx="100" cy="100" r="5" fill="#1E90FF" opacity="0.1"/>
    <circle cx="200" cy="150" r="5" fill="#1E90FF" opacity="0.1"/>
    <circle cx="300" cy="80" r="5" fill="#1E90FF" opacity="0.1"/>
    <circle cx="400" cy="200" r="5" fill="#1E90FF" opacity="0.1"/>
    <circle cx="500" cy="120" r="5" fill="#1E90FF" opacity="0.1"/>
    <circle cx="600" cy="180" r="5" fill="#1E90FF" opacity="0.1"/>
    <circle cx="700" cy="90" r="5" fill="#1E90FF" opacity="0.1"/>
    
    <!-- 装饰性线条 -->
    <path d="M50 250 Q400 200 750 250" 
          stroke="#1E90FF" 
          stroke-width="1" 
          fill="none" 
          opacity="0.1"/>
</svg> 